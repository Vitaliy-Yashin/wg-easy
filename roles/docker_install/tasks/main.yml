- name: Install curl & ca-certificates
  ansible.builtin.apt:
    update_cache: true
    name:
     - ca-certificates
     - curl
    state: present

- name: Create directory /etc/apt/keyrings   
  ansible.builtin.file:
    state: directory
    path: /etc/apt/keyrings
    mode: '0755'
    
- name: Download https://download.docker.com/linux/ubuntu/gpg
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Set repository
  ansible.builtin.template:
    src: docker.sources
    dest: /etc/apt/sources.list.d/docker.sources
    mode: '0644'

- name: Apt update & install docker
  ansible.builtin.apt:
    update_cache: true
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Docker Enable
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Set DaemonJson
  ansible.builtin.template:
    src: daemon.json
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  when: "'local' in group_names"

- name: Docker reload
  ansible.builtin.systemd:
    name: docker
    state: reloaded
  when: "'local' in group_names"  




