- name: Include docker env
  ansible.builtin.include_vars:
    file: vault/secret.yml
- name: Install module wireguard
  ansible.builtin.apt:
    name: wireguard
    state: present

- name: Container run wg-easy
  community.docker.docker_container:
    name: wireguard
    image: torqdl/wg-easy
    state: started
    ports:
     - 51820:51820/udp
     - 51821:51821/tcp 
    sysctls:
       net.ipv4.conf.all.src_valid_mark: 1
       net.ipv4.ip_forward: 1
    env:
      PASSWORD: "{{ docker_env.password }}"   
      WG_HOST: "{{ docker_env.host }}"
      WG_MTU: "{{ docker_env.mtu }}"
      WG_DEFAULT_ADDRESS: "{{ docker_env.default_address }}"
      WG_ALLOWED_IPS: "{{ docker_env.allowed_ips }}"
      WG_PERSISTENT_KEEPALIVE: "{{ docker_env.keep_alive }}"
    capabilities:
      - NET_ADMIN                
      - SYS_MODULE
    volumes:
      - /opt/wg-easy:/etc/wireguard
    restart_policy: always